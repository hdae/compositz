# Supply-chain guard: refuse packages published less than 24h ago. Also marks
# the pnpm workspace boundary for this standalone project.
minimumReleaseAge: 1440
# Pin the whole vite-plus toolchain to one coherent minor line. `@latest` skews:
# core/CLI are at 0.2.x but @voidzero-dev/vite-plus-test still tops out at 0.1.24
# (no bin under 0.2.x), so `vp test` cannot find its vitest bin. 0.1.24 is the
# newest version where CLI + core + test agree. Revisit when test 0.2.x ships.
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.1.24
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.24
  vite-plus: 0.1.24
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
