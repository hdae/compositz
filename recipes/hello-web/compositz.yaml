manifestVersion: 2
id: hello-web
name: Hello Web
version: "0.1.0"
description: Minimal static site that exercises the build -> run -> open flow.

# Build the image from ./Dockerfile (dockerfile defaults to "Dockerfile").
build: {}

# The container serves its web UI on port 80; publish it to localhost:8090.
ports:
  - name: web
    container: 80
    host: 8090
    web: true
    description: Static hello page.

# No accelerator needed for a static site.
gpu: none
