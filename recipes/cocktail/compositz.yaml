manifestVersion: 2
id: cocktail
name: Cocktail
version: "0.1.0"
description: >-
  日本語チャットから Anima で高品質イラストを生成するマルチターン UI
  (hdae/cocktail: Gemma GGUF + diffusers Anima)。要 CUDA GPU。

# Build from ./Dockerfile. The Dockerfile clones the upstream repo itself (this
# bundle ships only the recipe, no vendored source), so `up` needs the upstream
# ref pinned here — bump COCKTAIL_REF to update.
build:
  args:
    COCKTAIL_REF: c74dec758197ef2f73246a208cb019963389dd59

# One port serves BOTH the chat UI and the API on the same origin: the FastAPI
# server mounts the built Vite SPA at "/" and keeps the API under "/api/*"
# (apps/server/src/cocktail_server/main.py `_register_spa`).
ports:
  - name: web
    container: 8000
    host: 8000
    web: true
    path: /
    description: チャット UI 兼 API（同一オリジン、/api/* が API）。

# Under compositz the heavy shareables (venv / uv cache / managed Python / HF
# hub cache / weights) live on the shared cache volumes declared below — the
# presets' create-time env overrides the Dockerfile's /workspace defaults
# (ADR-024). This volume keeps what is genuinely per-instance: generated images
# (IMAGES_DIR) — plus everything, when the image runs standalone off compositz.
mounts:
  - name: workspace
    target: /workspace
    placement: volume
    description: 生成画像 (IMAGES_DIR) の置き場。standalone 実行時は全データがここへ集約。

# Shared managed caches — the point (ADR-024): a duplicated instance's first
# boot re-downloads nothing. `venv` gives a per-instance venv on the shared uv
# volume (the entrypoint's `uv sync` reads the injected UV_PROJECT_ENVIRONMENT);
# `huggingface` shares the HF hub cache (Anima etc.); `cocktail-weights` shares
# fetch_models' GGUF/weight downloads (atomic tmp+sha256+rename, so concurrent
# first boots are safe). `scope: shared` here means "across duplicates of THIS
# recipe" — the name is a cooperative namespace, not an isolation boundary
# (docs/limitations.md).
cache:
  - type: venv
  - type: huggingface
  - type: custom
    name: cocktail-weights
    env: WEIGHTS_DIR
    scope: shared

env:
  - name: CIVITAI_TOKEN
    description: Civitai の gated モデルを使うときのみ設定。既定モデルは不要。
  - name: RESIDENCY_MODE
    default: auto
    description: VRAM 運用モード auto/swap/coresident（16GB=swap、24GB+=coresident）。
  - name: STARTUP_PRELOAD
    default: "true"
    description: 起動時にモデルを DL+プリロード。GPU 無しで smoke するときだけ false。

# CUDA-only: the LLM runs on a source-built CUDA llama.cpp wheel and image gen
# runs diffusers on the GPU (torch cu128). Fail fast on a GPU-less host.
gpu: required
